name: Package and release

on:
  push:
    tags:
      - '**'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            os: windows-latest
            target: win
            artifact: dist/*.exe
          - label: macOS
            os: macos-latest
            target: mac
            artifact: dist/*.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install official Kimi Code runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: irm https://code.kimi.com/kimi-code/install.ps1 | iex

      - name: Install official Kimi Code runtime (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: curl -fsSL https://code.kimi.com/kimi-code/install.sh | bash

      - name: Build installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist -- --${{ matrix.target }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: farside-${{ matrix.target }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
