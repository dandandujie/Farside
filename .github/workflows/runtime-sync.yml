name: Audit Kimi Code upstream

on:
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: runtime-upstream-audit
  cancel-in-progress: false

jobs:
  audit:
    name: Detect upstream changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Check upstream version without modifying Farside
        id: upstream
        run: node scripts/check-kimi-upstream.mjs

      - name: Open adaptation audit issue
        if: steps.upstream.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: "runtime: 审查 Kimi Code ${{ steps.upstream.outputs.upstream_version }} 适配"
        shell: bash
        run: |
          set -euo pipefail
          existing="$(gh issue list --state open --limit 100 --json number,title --jq '.[] | select(.title == env.TITLE) | .number' | head -n 1)"
          if [ -z "$existing" ]; then
            gh issue create --title "$TITLE" --body-file .tmp/kimi-upstream-audit.md
          else
            echo "适配审查事项 #${existing} 已存在"
          fi
